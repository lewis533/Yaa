<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lewis & sarafina ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --plum: #2d0a3e;
    --deep: #1a0528;
    --lavender: #c9a8e0;
    --lilac: #e8d5f5;
    --rose: #f0c4d4;
    --blush: #fce8f0;
    --gold: #e8c97a;
    --white: #fff8fe;
    --glow: rgba(200,160,224,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--deep);
    color: var(--lilac);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--lavender);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
    mix-blend-mode: screen;
  }
  .cursor-trail {
    position: fixed;
    width: 30px; height: 30px;
    border: 1px solid rgba(200,160,224,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: left 0.12s ease, top 0.12s ease;
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── FLOATING PETALS ── */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: fall linear infinite;
    opacity: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) scale(1.1); opacity: 0; }
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.03;
    z-index: 2;
    pointer-events: none;
  }

  /* ── SECTIONS ── */
  section { position: relative; z-index: 3; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  .hero-glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(180,100,220,0.22) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  .title-small {
    font-family: 'Sacramento', cursive;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--rose);
    letter-spacing: 0.05em;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .title-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 400;
    font-style: italic;
    background: linear-gradient(135deg, var(--white) 0%, var(--lavender) 50%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
    letter-spacing: -0.02em;
  }

  .title-amp {
    font-family: 'Sacramento', cursive;
    font-size: clamp(2rem, 6vw, 4rem);
    -webkit-text-fill-color: var(--gold);
    color: var(--gold);
    display: block;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.9s;
    margin: -0.3rem 0;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200,168,224,0.5);
    animation: fadeUp 1s ease forwards 2s, bounce 2s ease-in-out 3s infinite;
    opacity: 0;
  }
  .scroll-hint::after {
    content: '';
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--lavender), transparent);
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PHOTO SECTION ── */
  #photo-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .photo-frame-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .photo-frame {
    position: relative;
    width: min(380px, 85vw);
    aspect-ratio: 3/4;
    border-radius: 2px;
  }

  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--lavender), var(--rose), var(--gold), var(--lavender));
    border-radius: 4px;
    z-index: -1;
    animation: borderRotate 4s linear infinite;
    background-size: 300% 300%;
  }
  @keyframes borderRotate {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .photo-frame::after {
    content: '';
    position: absolute;
    inset: -20px;
    background: radial-gradient(ellipse, rgba(180,100,220,0.2) 0%, transparent 70%);
    z-index: -2;
    border-radius: 50%;
  }

  .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    filter: saturate(1.1) contrast(1.02);
  }

  /* Placeholder when no image */
  .photo-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(145deg, rgba(80,20,120,0.6), rgba(40,10,70,0.8));
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: rgba(200,168,224,0.4);
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .photo-placeholder svg { opacity: 0.3; }

  .photo-caption {
    font-family: 'Sacramento', cursive;
    font-size: 2rem;
    color: var(--rose);
    text-align: center;
  }

  /* Decorative corner flowers */
  .corner {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.6;
    animation: floatCorner 3s ease-in-out infinite;
  }
  .corner.tl { top: -18px; left: -18px; animation-delay: 0s; }
  .corner.tr { top: -18px; right: -18px; animation-delay: 0.5s; }
  .corner.bl { bottom: -18px; left: -18px; animation-delay: 1s; }
  .corner.br { bottom: -18px; right: -18px; animation-delay: 1.5s; }
  @keyframes floatCorner {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%       { transform: translateY(-5px) rotate(15deg); }
  }

  /* ── MUSIC PLAYER ── */
  #music-section {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .player-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,168,224,0.15);
    border-radius: 24px;
    padding: 2.5rem;
    width: min(400px, 90vw);
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,168,224,0.08) inset;
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(180,100,220,0.15), transparent 70%);
    border-radius: 50%;
  }

  .player-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(200,168,224,0.5);
    margin-bottom: 1.5rem;
  }

  .player-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--white);
    margin-bottom: 0.3rem;
  }

  .player-sub {
    font-size: 0.85rem;
    color: rgba(200,168,224,0.5);
    margin-bottom: 2rem;
    font-style: italic;
  }

  /* Waveform visualizer */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 1.8rem;
  }
  .wave-bar {
    flex: 1;
    background: linear-gradient(to top, var(--lavender), var(--rose));
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
    opacity: 0.5;
  }
  .wave-bar.playing { opacity: 1; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50%       { transform: scaleY(1); }
  }
  .wave-bar:nth-child(1)  { animation-delay: 0.0s; }
  .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { animation-delay: 0.15s; }
  .wave-bar:nth-child(5)  { animation-delay: 0.05s; }
  .wave-bar:nth-child(6)  { animation-delay: 0.25s; }
  .wave-bar:nth-child(7)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(8)  { animation-delay: 0.3s; }
  .wave-bar:nth-child(9)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(10) { animation-delay: 0.05s; }
  .wave-bar:nth-child(11) { animation-delay: 0.15s; }
  .wave-bar:nth-child(12) { animation-delay: 0.0s; }
  .wave-bar:nth-child(13) { animation-delay: 0.22s; }
  .wave-bar:nth-child(14) { animation-delay: 0.08s; }
  .wave-bar:nth-child(15) { animation-delay: 0.18s; }
  .wave-bar:nth-child(16) { animation-delay: 0.28s; }
  .wave-bar:nth-child(17) { animation-delay: 0.12s; }
  .wave-bar:nth-child(18) { animation-delay: 0.04s; }
  .wave-bar:nth-child(19) { animation-delay: 0.16s; }
  .wave-bar:nth-child(20) { animation-delay: 0.24s; }

  .wave-bar.paused { animation-play-state: paused; }

  /* Progress */
  .progress-wrap {
    position: relative;
    height: 3px;
    background: rgba(200,168,224,0.15);
    border-radius: 4px;
    margin-bottom: 1rem;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--lavender), var(--rose));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s linear;
  }
  .progress-thumb {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--white);
    border-radius: 50%;
    top: 50%; transform: translate(-50%, -50%);
    left: 0%;
    box-shadow: 0 0 8px rgba(200,168,224,0.8);
    transition: left 0.3s linear;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(200,168,224,0.4);
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }

  .btn-ctrl {
    background: none;
    border: none;
    color: var(--lavender);
    cursor: none;
    opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
    padding: 0.5rem;
    display: flex;
  }
  .btn-ctrl:hover { opacity: 1; transform: scale(1.1); }

  .btn-play {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    box-shadow: 0 8px 24px rgba(180,100,220,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-play:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 32px rgba(180,100,220,0.6);
  }
  .btn-play svg { fill: var(--deep); }

  /* No-song placeholder */
  .no-song {
    text-align: center;
    color: rgba(200,168,224,0.35);
    font-style: italic;
    font-size: 0.9rem;
    padding: 1rem 0;
    letter-spacing: 0.05em;
  }

  /* ── FOOTER / CLOSING ── */
  #footer {
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
    gap: 1rem;
    position: relative;
  }

  .closing-script {
    font-family: 'Sacramento', cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(120deg, var(--rose), var(--lavender), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
  }

  .closing-sub {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(200,168,224,0.35);
    margin-top: 0.5rem;
  }

  .hearts-row {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
    font-size: 1.4rem;
  }
  .hearts-row span {
    animation: heartbeat 1.5s ease-in-out infinite;
  }
  .hearts-row span:nth-child(2) { animation-delay: 0.3s; }
  .hearts-row span:nth-child(3) { animation-delay: 0.6s; }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Upload instruction overlay (shown when no image) */
  .upload-note {
    position: absolute;
    bottom: -2.5rem;
    left: 50%; transform: translateX(-50%);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: rgba(200,168,224,0.3);
    white-space: nowrap;
    font-style: italic;
  }
</style>
</head>

  <span class="title-amp">&amp;</span>
  <h1 class="title-main">Lewis</h1>
  <div class="scroll-hint">scroll</div>
</section>
