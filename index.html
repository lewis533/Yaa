<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lewis & sarafina ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --plum: #2d0a3e;
    --deep: #1a0528;
    --lavender: #c9a8e0;
    --lilac: #e8d5f5;
    --rose: #f0c4d4;
    --blush: #fce8f0;
    --gold: #e8c97a;
    --white: #fff8fe;
    --glow: rgba(200,160,224,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--deep);
    color: var(--lilac);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--lavender);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
    mix-blend-mode: screen;
  }
  .cursor-trail {
    position: fixed;
    width: 30px; height: 30px;
    border: 1px solid rgba(200,160,224,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: left 0.12s ease, top 0.12s ease;
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── FLOATING PETALS ── */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: fall linear infinite;
    opacity: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) scale(1.1); opacity: 0; }
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.03;
    z-index: 2;
    pointer-events: none;
  }

  /* ── SECTIONS ── */
  section { position: relative; z-index: 3; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  .hero-glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(180,100,220,0.22) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  .title-small {
    font-family: 'Sacramento', cursive;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--rose);
    letter-spacing: 0.05em;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .title-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 400;
    font-style: italic;
    background: linear-gradient(135deg, var(--white) 0%, var(--lavender) 50%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
    letter-spacing: -0.02em;
  }

  .title-amp {
    font-family: 'Sacramento', cursive;
    font-size: clamp(2rem, 6vw, 4rem);
    -webkit-text-fill-color: var(--gold);
    color: var(--gold);
    display: block;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.9s;
    margin: -0.3rem 0;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200,168,224,0.5);
    animation: fadeUp 1s ease forwards 2s, bounce 2s ease-in-out 3s infinite;
    opacity: 0;
  }
  .scroll-hint::after {
    content: '';
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--lavender), transparent);
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PHOTO SECTION ── */
  #photo-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .photo-frame-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .photo-frame {
    position: relative;
    width: min(380px, 85vw);
    aspect-ratio: 3/4;
    border-radius: 2px;
  }

  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--lavender), var(--rose), var(--gold), var(--lavender));
    border-radius: 4px;
    z-index: -1;
    animation: borderRotate 4s linear infinite;
    background-size: 300% 300%;
  }
  @keyframes borderRotate {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .photo-frame::after {
    content: '';
    position: absolute;
    inset: -20px;
    background: radial-gradient(ellipse, rgba(180,100,220,0.2) 0%, transparent 70%);
    z-index: -2;
    border-radius: 50%;
  }

  .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    filter: saturate(1.1) contrast(1.02);
  }

  /* Placeholder when no image */
  .photo-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(145deg, rgba(80,20,120,0.6), rgba(40,10,70,0.8));
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: rgba(200,168,224,0.4);
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .photo-placeholder svg { opacity: 0.3; }

  .photo-caption {
    font-family: 'Sacramento', cursive;
    font-size: 2rem;
    color: var(--rose);
    text-align: center;
  }

  /* Decorative corner flowers */
  .corner {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.6;
    animation: floatCorner 3s ease-in-out infinite;
  }
  .corner.tl { top: -18px; left: -18px; animation-delay: 0s; }
  .corner.tr { top: -18px; right: -18px; animation-delay: 0.5s; }
  .corner.bl { bottom: -18px; left: -18px; animation-delay: 1s; }
  .corner.br { bottom: -18px; right: -18px; animation-delay: 1.5s; }
  @keyframes floatCorner {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%       { transform: translateY(-5px) rotate(15deg); }
  }

  /* ── MUSIC PLAYER ── */
  #music-section {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .player-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,168,224,0.15);
    border-radius: 24px;
    padding: 2.5rem;
    width: min(400px, 90vw);
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,168,224,0.08) inset;
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(180,100,220,0.15), transparent 70%);
    border-radius: 50%;
  }

  .player-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(200,168,224,0.5);
    margin-bottom: 1.5rem;
  }

  .player-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--white);
    margin-bottom: 0.3rem;
  }

  .player-sub {
    font-size: 0.85rem;
    color: rgba(200,168,224,0.5);
    margin-bottom: 2rem;
    font-style: italic;
  }

  /* Waveform visualizer */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 1.8rem;
  }
  .wave-bar {
    flex: 1;
    background: linear-gradient(to top, var(--lavender), var(--rose));
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
    opacity: 0.5;
  }
  .wave-bar.playing { opacity: 1; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50%       { transform: scaleY(1); }
  }
  .wave-bar:nth-child(1)  { animation-delay: 0.0s; }
  .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { animation-delay: 0.15s; }
  .wave-bar:nth-child(5)  { animation-delay: 0.05s; }
  .wave-bar:nth-child(6)  { animation-delay: 0.25s; }
  .wave-bar:nth-child(7)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(8)  { animation-delay: 0.3s; }
  .wave-bar:nth-child(9)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(10) { animation-delay: 0.05s; }
  .wave-bar:nth-child(11) { animation-delay: 0.15s; }
  .wave-bar:nth-child(12) { animation-delay: 0.0s; }
  .wave-bar:nth-child(13) { animation-delay: 0.22s; }
  .wave-bar:nth-child(14) { animation-delay: 0.08s; }
  .wave-bar:nth-child(15) { animation-delay: 0.18s; }
  .wave-bar:nth-child(16) { animation-delay: 0.28s; }
  .wave-bar:nth-child(17) { animation-delay: 0.12s; }
  .wave-bar:nth-child(18) { animation-delay: 0.04s; }
  .wave-bar:nth-child(19) { animation-delay: 0.16s; }
  .wave-bar:nth-child(20) { animation-delay: 0.24s; }

  .wave-bar.paused { animation-play-state: paused; }

  /* Progress */
  .progress-wrap {
    position: relative;
    height: 3px;
    background: rgba(200,168,224,0.15);
    border-radius: 4px;
    margin-bottom: 1rem;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--lavender), var(--rose));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s linear;
  }
  .progress-thumb {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--white);
    border-radius: 50%;
    top: 50%; transform: translate(-50%, -50%);
    left: 0%;
    box-shadow: 0 0 8px rgba(200,168,224,0.8);
    transition: left 0.3s linear;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(200,168,224,0.4);
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }

  .btn-ctrl {
    background: none;
    border: none;
    color: var(--lavender);
    cursor: none;
    opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
    padding: 0.5rem;
    display: flex;
  }
  .btn-ctrl:hover { opacity: 1; transform: scale(1.1); }

  .btn-play {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--lavender), var(--rose));
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    box-shadow: 0 8px 24px rgba(180,100,220,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-play:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 32px rgba(180,100,220,0.6);
  }
  .btn-play svg { fill: var(--deep); }

  /* No-song placeholder */
  .no-song {
    text-align: center;
    color: rgba(200,168,224,0.35);
    font-style: italic;
    font-size: 0.9rem;
    padding: 1rem 0;
    letter-spacing: 0.05em;
  }

  /* ── FOOTER / CLOSING ── */
  #footer {
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem;
    gap: 1rem;
    position: relative;
  }

  .closing-script {
    font-family: 'Sacramento', cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(120deg, var(--rose), var(--lavender), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
  }

  .closing-sub {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(200,168,224,0.35);
    margin-top: 0.5rem;
  }

  .hearts-row {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
    font-size: 1.4rem;
  }
  .hearts-row span {
    animation: heartbeat 1.5s ease-in-out infinite;
  }
  .hearts-row span:nth-child(2) { animation-delay: 0.3s; }
  .hearts-row span:nth-child(3) { animation-delay: 0.6s; }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Upload instruction overlay (shown when no image) */
  .upload-note {
    position: absolute;
    bottom: -2.5rem;
    left: 50%; transform: translateX(-50%);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: rgba(200,168,224,0.3);
    white-space: nowrap;
    font-style: italic;
  }
</style>
</head>

<!-- Cursor -->

<div class="cursor-trail" id="trail"></div>

<!-- Canvas for stars/particles -->
<canvas id="bg-canvas"></canvas>

<!-- Floating petals -->
<div id="petals-container"></div>

<!-- ══ HERO ══ -->

  <div class="hero-glow"></div>
  <p class="title-small">a little something for</p>
  <h1 class="title-main">Sarafina</h1>
  <span class="title-amp">&amp;</span>
  <h1 class="title-main">Lewis</h1>
  <div class="scroll-hint">scroll</div>
</section>

<!-- ══ MUSIC ══ -->
<section id="music-section">
  <div class="player-card reveal">
    <p class="player-label">now playing</p>
    <p class="player-title" id="song-title">your song</p>
    <p class="player-sub" id="song-artist">lewis & sarafina</p>

    <div class="waveform" id="waveform">
      <!-- 20 bars -->
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
      <div class="progress-thumb" id="progress-thumb"></div>
    </div>
    <div class="time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>

    <div class="controls">
      <button class="btn-ctrl" id="btn-shuffle" title="shuffle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21,16 21,21 16,21"/><line x1="4" y1="4" x2="9" y2="9"/>
        </svg>
      </button>
      <button class="btn-play" id="btn-play">
        <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="btn-ctrl" id="btn-loop" title="loop">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="17,1 21,5 17,9"/><path d="M3,11V9a4,4,0,0,1,4-4h14"/>
          <polyline points="7,23 3,19 7,15"/><path d="M21,13v2a4,4,0,0,1-4,4H3"/>
        </svg>
      </button>
    </div>

    <audio id="audio-player" loop></audio>
  </div>
</section>

<!-- ══ FOOTER ══ -->
<section id="footer">
  <p class="closing-script reveal">lewis & sarafina</p>
  <p class="closing-sub reveal">forever in the vibes ✦</p>
  <div class="hearts-row reveal">
    <span>🌸</span><span>💜</span><span>🌸</span>
  </div>
</section>

<script>
// ── CURSOR ──
const cursor = document.getElementById('cursor');
const trail = document.getElementById('trail');
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx - 6 + 'px';
  cursor.style.top  = my - 6 + 'px';
  setTimeout(() => {
    trail.style.left = mx - 15 + 'px';
    trail.style.top  = my - 15 + 'px';
  }, 80);
});

// ── STAR CANVAS ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function initCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = Array.from({ length: 160 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.004 + 0.001,
    phase: Math.random() * Math.PI * 2
  }));
}

function drawCanvas(t) {
  ctx.clearRect(0, 0, W, H);
  // Gradient bg
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
  grad.addColorStop(0, '#2d0a3e');
  grad.addColorStop(0.5, '#1a0528');
  grad.addColorStop(1, '#0d0118');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Soft orbs
  [[W*0.2, H*0.3, 200, 'rgba(140,60,200,0.08)'],
   [W*0.8, H*0.6, 250, 'rgba(200,100,180,0.06)'],
   [W*0.5, H*0.8, 180, 'rgba(100,60,180,0.07)']].forEach(([ox,oy,or,oc]) => {
    const og = ctx.createRadialGradient(ox, oy, 0, ox, oy, or);
    og.addColorStop(0, oc); og.addColorStop(1, 'transparent');
    ctx.fillStyle = og; ctx.beginPath();
    ctx.arc(ox, oy, or, 0, Math.PI*2); ctx.fill();
  });

  // Stars
  stars.forEach(s => {
    s.a = 0.3 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,195,245,${s.a})`;
    ctx.fill();
  });

  requestAnimationFrame(t => drawCanvas(t / 1000));
}

initCanvas();
window.addEventListener('resize', initCanvas);
requestAnimationFrame(t => drawCanvas(t / 1000));

// ── PETALS ──
const petalSymbols = ['🌸','🌷','✦','·','✿','◦'];
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petalSymbols[Math.floor(Math.random() * petalSymbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (Math.random() * 14 + 8) + 'px';
  el.style.animationDuration = (Math.random() * 8 + 6) + 's';
  el.style.animationDelay = (Math.random() * 2) + 's';
  document.getElementById('petals-container').appendChild(el);
  setTimeout(() => el.remove(), 16000);
}
setInterval(spawnPetal, 600);

// ── WAVEFORM ──
const wf = document.getElementById('waveform');
for (let i = 0; i < 20; i++) {
  const b = document.createElement('div');
  b.className = 'wave-bar paused';
  b.style.height = (Math.random() * 70 + 20) + '%';
  wf.appendChild(b);
}

// ── AUDIO PLAYER ──
const audio = document.getElementById('audio-player');
const btnPlay = document.getElementById('btn-play');
const playIcon = document.getElementById('play-icon');
const progressFill = document.getElementById('progress-fill');
const progressThumb = document.getElementById('progress-thumb');
const progressWrap = document.getElementById('progress-wrap');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const bars = document.querySelectorAll('.wave-bar');

let isPlaying = false;

audio.src = 'https://res.cloudinary.com/ddrpctqpl/video/upload/v1778954330/Shut_It_Down_AYrrK0FhW14_1_wxozmm.mp3';
document.getElementById('song-title').textContent = 'Shut It Down';

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function togglePlay() {
  if (!audio.src || audio.src === window.location.href) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    bars.forEach(b => { b.classList.remove('playing'); b.classList.add('paused'); });
  } else {
    audio.play();
    isPlaying = true;
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    bars.forEach(b => { b.classList.add('playing'); b.classList.remove('paused'); });
  }
}

btnPlay.addEventListener('click', togglePlay);

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeCurrent.textContent = fmt(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = fmt(audio.duration);
});

progressWrap.addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = progressWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// ── SCROLL REVEAL ──
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.15 });
reveals.forEach(r => observer.observe(r));

const photoFrame = document.getElementById("photo-frame");

// photo already embedded

// Click to upload song — shows on player card
document.getElementById('btn-shuffle').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'audio/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (file) {
      audio.src = URL.createObjectURL(file);
      document.getElementById('song-title').textContent = file.name.replace(/\.[^.]+$/, '');
    }
  };
  input.click();
});
</script>
